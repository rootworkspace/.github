name: 'Monthly activity report'

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-activity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Calculate Rolling Dates
        id: dates
        run: |
          SINCE=$(date -d "31 days ago" +%Y-%m-%dT%H:%M:%SZ)
          UNTIL=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          echo "since=$SINCE" >> $GITHUB_OUTPUT
          echo "until=$UNTIL" >> $GITHUB_OUTPUT

      - name: Generate Report
        uses: rootworkspace/user-activity-report
        id: report
        with:
          GITHUB_TOKEN: ${{ secrets.ORG_STATS_TOKEN }}
          GITHUB_ORGANIZATION: 'rootworkspace'
      
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: |
            data.json